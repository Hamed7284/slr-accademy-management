<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLR Tennis Academy — سیستم مدیریت</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --clay:#c4622d;--clay2:#e07a45;--clay3:#f0956a;
  --green:#2d6a1f;--green2:#3d8c2a;--green3:#5dbc40;
  --dark:#1a0d06;--dark2:#2a1509;
  --cream:#f5efe6;--gray:#8a7a6e;--lightgray:#e8e0d8;
  --white:#fff;--gold:#e8c14a;
  --shadow:0 4px 24px rgba(26,13,6,.15);
  --radius:10px;
}
body{font-family:'Vazirmatn',sans-serif;background:#f0ece3;color:#2a1509;min-height:100vh;}

/* ── APP SHELL ── */
#app{display:none;}
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1a0d06 0%,#3d1a0a 50%,#1a2d10 100%);
  padding:1rem;
}

/* ── LOGIN ── */
.login-card{
  background:rgba(245,239,230,.97);border-radius:20px;
  padding:2.5rem;width:100%;max-width:400px;
  box-shadow:0 30px 80px rgba(0,0,0,.5);
}
.login-logo{text-align:center;margin-bottom:2rem;}
.login-logo .ico{font-size:3rem;display:block;margin-bottom:.5rem;}
.login-logo h1{font-size:1.5rem;font-weight:800;color:var(--dark);letter-spacing:1px;}
.login-logo p{font-size:.8rem;color:var(--gray);margin-top:.2rem;}
.lform-group{margin-bottom:1.2rem;}
.lform-group label{display:block;font-size:.75rem;font-weight:700;color:var(--gray);letter-spacing:1px;text-transform:uppercase;margin-bottom:.5rem;}
.lform-group input,.lform-group select{
  width:100%;padding:.8rem 1rem;border:1.5px solid var(--lightgray);
  border-radius:8px;font-size:.9rem;font-family:'Vazirmatn',sans-serif;
  background:var(--white);outline:none;transition:border-color .3s;direction:rtl;
}
.lform-group input:focus,.lform-group select:focus{border-color:var(--clay2);}
.login-btn{
  width:100%;background:var(--clay2);color:var(--white);
  border:none;border-radius:8px;padding:.9rem;
  font-family:'Vazirmatn',sans-serif;font-size:1rem;font-weight:700;
  cursor:pointer;transition:all .3s;margin-top:.5rem;
}
.login-btn:hover{background:var(--clay);transform:translateY(-2px);}
.login-err{color:#c0392b;font-size:.8rem;text-align:center;margin-top:.8rem;display:none;}
.login-tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;background:var(--lightgray);border-radius:8px;padding:.3rem;}
.ltab{flex:1;padding:.5rem;border:none;border-radius:6px;font-family:'Vazirmatn',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;background:transparent;color:var(--gray);transition:all .3s;}
.ltab.a{background:var(--white);color:var(--clay);box-shadow:0 2px 8px rgba(0,0,0,.1);}

/* ── TOPBAR ── */
.topbar{
  background:var(--dark);color:var(--cream);
  padding:.8rem 1.5rem;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.topbar-logo{font-size:1rem;font-weight:800;letter-spacing:2px;display:flex;align-items:center;gap:.5rem;}
.topbar-logo .dot{width:8px;height:8px;border-radius:50%;background:var(--clay2);}
.topbar-user{display:flex;align-items:center;gap:1rem;}
.topbar-name{font-size:.8rem;color:rgba(245,239,230,.6);}
.topbar-role{font-size:.65rem;background:rgba(196,98,45,.25);color:var(--clay3);border:1px solid rgba(196,98,45,.3);padding:.2rem .6rem;border-radius:20px;letter-spacing:1px;}
.logout-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(245,239,230,.7);padding:.35rem .8rem;border-radius:5px;font-size:.72rem;cursor:pointer;font-family:'Vazirmatn',sans-serif;transition:all .3s;}
.logout-btn:hover{background:rgba(196,98,45,.2);color:var(--cream);}

/* ── NAV TABS ── */
.nav-tabs{
  background:var(--white);border-bottom:2px solid var(--lightgray);
  display:flex;overflow-x:auto;padding:0 1.5rem;
  scrollbar-width:none;
}
.nav-tabs::-webkit-scrollbar{display:none;}
.ntab{
  padding:.9rem 1.4rem;border:none;background:none;
  font-family:'Vazirmatn',sans-serif;font-size:.83rem;font-weight:600;
  color:var(--gray);cursor:pointer;white-space:nowrap;
  border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .25s;
}
.ntab.a{color:var(--clay);border-bottom-color:var(--clay);}
.ntab:hover{color:var(--clay2);}

/* ── MAIN ── */
.main{padding:1.5rem;max-width:1100px;margin:0 auto;}

/* ── CARDS ── */
.card{background:var(--white);border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow);margin-bottom:1.5rem;}
.card-title{font-size:1rem;font-weight:800;color:var(--dark);margin-bottom:1.2rem;display:flex;align-items:center;gap:.5rem;}
.card-title .ico{font-size:1.2rem;}

/* ── FORM ELEMENTS ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;}
.form-group{margin-bottom:1rem;}
.form-group label{display:block;font-size:.75rem;font-weight:700;color:var(--gray);letter-spacing:.5px;margin-bottom:.4rem;}
.form-group input,.form-group select,.form-group textarea{
  width:100%;padding:.7rem 1rem;border:1.5px solid var(--lightgray);
  border-radius:7px;font-size:.88rem;font-family:'Vazirmatn',sans-serif;
  background:var(--white);outline:none;transition:all .3s;direction:rtl;
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--clay2);background:#fffaf7;}
.form-group textarea{resize:vertical;min-height:70px;line-height:1.6;}
.form-group select option{background:var(--white);}

/* Rating stars */
.rating-row{display:flex;align-items:center;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid #f0ece3;}
.rating-row:last-child{border-bottom:none;}
.rating-label{font-size:.83rem;color:#3a2010;font-weight:500;flex:1;}
.stars-input{display:flex;gap:.3rem;flex-direction:row-reverse;}
.stars-input input{display:none;}
.stars-input label{font-size:1.4rem;color:#ddd;cursor:pointer;transition:color .2s;line-height:1;}
.stars-input input:checked ~ label,.stars-input label:hover,.stars-input label:hover ~ label{color:var(--gold);}

/* checkbox group */
.check-group{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.3rem;}
.check-item{display:flex;align-items:center;gap:.4rem;background:var(--lightgray);border-radius:20px;padding:.3rem .8rem;cursor:pointer;font-size:.78rem;font-weight:500;transition:all .25s;border:1.5px solid transparent;}
.check-item:hover{border-color:var(--clay2);background:#fdf0ea;}
.check-item input{display:none;}
.check-item.checked{background:#fdf0ea;border-color:var(--clay2);color:var(--clay);}

/* status badge */
.badge{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .7rem;border-radius:20px;font-size:.7rem;font-weight:700;letter-spacing:.5px;}
.badge-green{background:#edfaf0;color:#2d7a3a;border:1px solid #b8e8c0;}
.badge-clay{background:#fdf0ea;color:var(--clay);border:1px solid #f0c0a0;}
.badge-gray{background:var(--lightgray);color:var(--gray);border:1px solid #d0c8c0;}
.badge-gold{background:#fdf8e8;color:#8a6a10;border:1px solid #e8d890;}

/* ── SUBMIT BTN ── */
.submit-btn{
  background:var(--clay2);color:var(--white);
  border:none;border-radius:8px;padding:.9rem 2rem;
  font-family:'Vazirmatn',sans-serif;font-size:.95rem;font-weight:700;
  cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;gap:.5rem;
}
.submit-btn:hover{background:var(--clay);transform:translateY(-2px);box-shadow:0 6px 20px rgba(196,98,45,.3);}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem;}
.stat-card{background:var(--white);border-radius:var(--radius);padding:1.2rem;box-shadow:var(--shadow);text-align:center;border-top:3px solid var(--clay2);}
.stat-card.green{border-top-color:var(--green3);}
.stat-card.gold{border-top-color:var(--gold);}
.stat-card.dark{border-top-color:var(--dark);}
.stat-n{font-size:2rem;font-weight:800;color:var(--dark);line-height:1;}
.stat-l{font-size:.72rem;color:var(--gray);margin-top:.3rem;font-weight:600;}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.83rem;}
thead tr{background:var(--dark);color:var(--cream);}
thead th{padding:.8rem 1rem;text-align:right;font-weight:600;font-size:.75rem;letter-spacing:.5px;white-space:nowrap;}
tbody tr{border-bottom:1px solid #f0ece3;transition:background .2s;}
tbody tr:hover{background:#fdf8f5;}
tbody td{padding:.75rem 1rem;color:#2a1509;vertical-align:middle;}

/* ── REPORT VIEW ── */
.report-card{
  background:var(--white);border-radius:var(--radius);padding:1.8rem;
  box-shadow:var(--shadow);margin-bottom:1rem;
  border-right:4px solid var(--clay2);
  cursor:pointer;transition:all .3s;
}
.report-card:hover{box-shadow:0 8px 30px rgba(196,98,45,.15);transform:translateX(-3px);}
.rc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.8rem;}
.rc-name{font-size:1rem;font-weight:800;color:var(--dark);}
.rc-meta{font-size:.75rem;color:var(--gray);margin-top:.2rem;}
.rc-score{text-align:center;}
.rc-score-n{font-size:1.8rem;font-weight:800;color:var(--clay);}
.rc-score-l{font-size:.65rem;color:var(--gray);}
.rc-skills{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.6rem;}
.skill-pill{background:#fdf0ea;color:var(--clay);border:1px solid #f0c0a0;border-radius:20px;padding:.2rem .7rem;font-size:.7rem;font-weight:600;}

/* ── PROGRESS BAR ── */
.progress-wrap{margin:.4rem 0;}
.progress-label{display:flex;justify-content:space-between;font-size:.75rem;color:var(--gray);margin-bottom:.2rem;}
.progress-bar{height:6px;background:#f0ece3;border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--clay2),var(--clay3));transition:width .6s ease;}

/* ── MODAL ── */
.modal-ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:1rem;}
.modal-ov.on{display:flex;}
.modal-box{background:var(--white);border-radius:16px;padding:2rem;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.3);}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid var(--lightgray);}
.modal-title{font-size:1.1rem;font-weight:800;color:var(--dark);}
.modal-close{background:none;border:none;font-size:1.4rem;cursor:pointer;color:var(--gray);transition:color .3s;padding:.2rem;}
.modal-close:hover{color:var(--clay);}

/* ── ALERT ── */
.alert{border-radius:8px;padding:.9rem 1.2rem;margin-bottom:1rem;font-size:.85rem;display:none;}
.alert-success{background:#edfaf0;border:1px solid #b8e8c0;color:#2d7a3a;}
.alert-err{background:#fdecea;border:1px solid #f5b8b0;color:#c0392b;}
.alert.show{display:block;}

/* ── PRINT ── */
@media print{
  .topbar,.nav-tabs,.no-print{display:none!important;}
  .main{padding:0;max-width:none;}
  .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid;}
}

/* ── SECTION HEADER ── */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
.section-title{font-size:1.1rem;font-weight:800;color:var(--dark);}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:3rem;color:var(--gray);}
.empty-state .ico{font-size:3rem;display:block;margin-bottom:.8rem;}
.empty-state p{font-size:.9rem;}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .stats-grid{grid-template-columns:1fr 1fr;}
  .form-grid,.form-grid-3{grid-template-columns:1fr;}
  .main{padding:1rem;}
}

/* SECTION DIVIDER */
.sec-divider{font-size:.7rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--clay);background:#fdf0ea;border:1px solid #f0c0a0;border-radius:5px;padding:.3rem .8rem;display:inline-block;margin-bottom:.8rem;}

/* PLAYER ROW in selector */
.player-option{padding:.6rem 1rem;border-bottom:1px solid #f0ece3;cursor:pointer;display:flex;align-items:center;gap:.8rem;transition:background .2s;border-radius:6px;}
.player-option:hover{background:#fdf0ea;}
.p-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;color:var(--white);}
.p-name{font-size:.88rem;font-weight:700;color:var(--dark);}
.p-level{font-size:.72rem;color:var(--gray);}
</style>
</head>

<script>
// ═══════════════════════════════════════════
// تبدیل تاریخ میلادی به شمسی (جلالی)
// ═══════════════════════════════════════════
// الگوریتم صحیح تبدیل میلادی به شمسی (jalaali-js)
function toJalali(gy, gm, gd) {
  var g_y = gy - 1600, g_m = gm - 1, g_d = gd - 1, i;
  var g_d_no = 365*g_y + Math.floor((g_y+3)/4) - Math.floor((g_y+99)/100) + Math.floor((g_y+399)/400);
  var gml = [31,28,31,30,31,30,31,31,30,31,30,31];
  for (i = 0; i < g_m; i++) g_d_no += gml[i];
  if (g_m > 1 && ((gy%4===0 && gy%100!==0) || gy%400===0)) g_d_no++;
  g_d_no += g_d;
  var j_d_no = g_d_no - 79;
  var j_np = Math.floor(j_d_no / 12053); j_d_no %= 12053;
  var jy = 979 + 33*j_np + 4*Math.floor(j_d_no/1461);
  j_d_no %= 1461;
  if (j_d_no >= 366) { jy += Math.floor((j_d_no-1)/365); j_d_no = (j_d_no-1)%365; }
  var jml = [31,31,31,31,31,31,30,30,30,30,30,29];
  for (i = 0; i < 11 && j_d_no >= jml[i]; i++) j_d_no -= jml[i];
  return [jy, i+1, j_d_no+1];
}
// الگوریتم صحیح تبدیل شمسی به میلادی
function fromJalali(jy, jm, jd) {
  jy += 1595;
  var days = -355779 + 365*jy + Math.floor(jy/33)*8 + Math.floor(((jy%33)+3)/4) + 78
           + jd + (jm < 7 ? (jm-1)*31 : (jm-7)*30 + 186);
  var gy = 400 * Math.floor(days/146097); days %= 146097;
  if (days > 36524) { gy += 100*Math.floor(--days/36524); days %= 36524; if (days >= 365) days++; }
  gy += 4*Math.floor(days/1461); days %= 1461;
  if (days > 365) { gy += Math.floor((days-1)/365); days = (days-1)%365; }
  var gd = days + 1;
  var gml = [0,31,29,31,30,31,30,31,31,30,31,30,31];
  var gm = 0;
  for (gm = 0; gd > gml[gm] && gm < 12; gm++) gd -= gml[gm];
  return [gy, gm, gd];
}
function miladi2Shamsi(dateStr) {
  if (!dateStr) return '';
  const parts = dateStr.split('-');
  if (parts.length < 3) return dateStr;
  const [jy, jm, jd] = toJalali(parseInt(parts[0]), parseInt(parts[1]), parseInt(parts[2]));
  const months = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
  return jd + ' ' + months[jm-1] + ' ' + jy;
}
function todayShamsiISO() {
  const now = new Date();
  const [jy, jm, jd] = toJalali(now.getFullYear(), now.getMonth()+1, now.getDate());
  return jy + '-' + String(jm).padStart(2,'0') + '-' + String(jd).padStart(2,'0');
}
function todayShamsiReadable() {
  const now = new Date();
  const [jy, jm, jd] = toJalali(now.getFullYear(), now.getMonth()+1, now.getDate());
  const months = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
  const days = ['یکشنبه','دوشنبه','سه‌شنبه','چهارشنبه','پنجشنبه','جمعه','شنبه'];
  return days[now.getDay()] + ' ' + jd + ' ' + months[jm-1] + ' ' + jy;
}
function shamsi2MiladiISO(shamsiStr) {
  if (!shamsiStr) return '';
  const parts = shamsiStr.split('-');
  if (parts.length < 3) return shamsiStr;
  const [gy, gm, gd] = fromJalali(parseInt(parts[0]), parseInt(parts[1]), parseInt(parts[2]));
  return gy + '-' + String(gm).padStart(2,'0') + '-' + String(gd).padStart(2,'0');
}
function dateToMiladi(dateStr) {
  if (!dateStr) return new Date(0);
  const parts = dateStr.split('-');
  const y = parseInt(parts[0]);
  if (y > 1500) return new Date(dateStr);
  const [gy, gm, gd] = fromJalali(y, parseInt(parts[1]), parseInt(parts[2]));
  return new Date(gy, gm-1, gd);
}

function segmentAverage(ratings, keys){
  const vals = keys.map(k=>ratings?.[k]).filter(v=>typeof v==='number');
  if(!vals.length) return 0;
  return +(vals.reduce((a,v)=>a+v,0)/vals.length).toFixed(2);
}

let currentUser = null;
function doLogin(){
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pass  = document.getElementById('loginPass').value;
  const err   = document.getElementById('loginErr');
  // case-insensitive email lookup
  const key = Object.keys(USERS).find(k=>k.toLowerCase()===email);
  const user = key ? USERS[key] : null;
  if(user && user.pass === pass){
    currentUser = {...user, email:key};
    err.style.display = 'none';
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    err.style.display = 'block';
  }
}

function doLogout(){
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPass').value = '';
}

let activeTab = '';

function initApp(){
  document.getElementById('topbarName').textContent = currentUser.name;
  document.getElementById('topbarRole').textContent = currentUser.role === 'admin' ? 'مدیر آکادمی' : 'مربی';
  buildNav();
  const firstTab = currentUser.role === 'admin' ? 'dashboard' : 'new-report';
  showTab(firstTab);
}

function buildNav(){
  const tabs = currentUser.role === 'admin'
    ? [
        {id:'dashboard',    label:'📊 داشبورد'},
        {id:'all-reports',  label:'📋 همه گزارش‌ها'},
        {id:'players',      label:'👥 بازیکنان'},
        {id:'by-coach',     label:'📊 گزارش مربیان'},
        {id:'manage-coaches', label:'👨‍🏫 مدیریت مربیان'},
      ]
    : [
        {id:'new-report',   label:'✏️ ثبت گزارش'},
        {id:'my-reports',   label:'📋 گزارش‌های من'},
        {id:'my-players',   label:'👥 بازیکنانم'},
      ];
  document.getElementById('navTabs').innerHTML = tabs.map(t =>
    `<button class="ntab" id="ntab-${t.id}" onclick="showTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function showTab(id){
  activeTab = id;
  document.querySelectorAll('.ntab').forEach(b=>b.classList.remove('a'));
  const btn = document.getElementById('ntab-'+id);
  if(btn) btn.classList.add('a');
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '';
  const renders = {
    'dashboard':   renderDashboard,
    'all-reports': renderAllReports,
    'players':     renderPlayers,
    'by-coach':    renderByCoach,
    'guide':       renderGuide,
    'new-report':  renderNewReport,
    'my-reports':  renderMyReports,
    'my-players':  renderMyPlayers,
  };
  if(renders[id]) renders[id]();
}

              <div>

function addPlayer(){
  const isCoach = currentUser.role === 'coach';
  const name = document.getElementById('np-name').value.trim();
  const age  = document.getElementById('np-age').value;
  const level= document.getElementById('np-level').value;
  const coach= isCoach ? currentUser.coachId : document.getElementById('np-coach').value;
  if(!name||!age){alert('نام و سن الزامیست');return;}
  const players = getPlayers();
  const colors = ['#c4622d','#2d6a1f','#e07a45','#5dbc40','#e8c14a','#3d8c2a'];
  players.push({
    id:'p'+Date.now(), name, age:parseInt(age), level, coachId:coach,
    avatar:colors[Math.floor(Math.random()*colors.length)]
  });
  savePlayers(players);
  document.getElementById('reportModal').classList.remove('on');
  if(isCoach) renderMyPlayers(); else renderPlayers();
}

function buildRating(...pairs){
  let html = '';
  for(let i=0;i<pairs.length;i+=2){
    const id=pairs[i], label=pairs[i+1];
    if(!label) break;
    html += `<div class="rating-row">
      <div class="rating-label">${label}</div>
      <div class="stars-input">
        <input type="radio" name="${id}" id="${id}-5" value="5"><label for="${id}-5">★</label>
        <input type="radio" name="${id}" id="${id}-4" value="4"><label for="${id}-4">★</label>
        <input type="radio" name="${id}" id="${id}-3" value="3" checked><label for="${id}-3">★</label>
        <input type="radio" name="${id}" id="${id}-2" value="2"><label for="${id}-2">★</label>
        <input type="radio" name="${id}" id="${id}-1" value="1"><label for="${id}-1">★</label>
      </div>
    </div>`;
  }
  return html;
}

function toggleCheck(el){
  el.classList.toggle('checked');
  el.querySelector('input').checked = el.classList.contains('checked');
}

function onPlayerSelect(id){
  const p = getPlayers().find(x=>x.id===id);
  if(p) document.getElementById('r-level').value = p.level;
  const box = document.getElementById('aiSuggestionBox');
  if(!box) return;
  if(!id){ box.innerHTML = ''; return; }
  generateCoachSuggestion(id);
}

function getRating(name){
  const checked = document.querySelector(`input[name="${name}"]:checked`);
  return checked ? parseInt(checked.value) : 3;
}

function saveReport(){
  const playerId = document.getElementById('r-player').value;
  if(!playerId){alert('لطفاً بازیکن را انتخاب کنید');return;}
  const player = getPlayers().find(p=>p.id===playerId);
  const focusAreas = [...document.querySelectorAll('#focusGroup .check-item.checked')].map(el=>el.querySelector('input').value);
  const ratings = {
    fhGrip:getRating('fh-grip'), fhSwing:getRating('fh-swing'), fhCtrl:getRating('fh-ctrl'),
    bhTech:getRating('bh-tech'), bhCtrl:getRating('bh-ctrl'), bhStab:getRating('bh-stab'),
    svToss:getRating('sv-toss'), svTech:getRating('sv-tech'), svAcc:getRating('sv-acc'),
    vlFh:getRating('vl-fh'), vlBh:getRating('vl-bh'),
    ftSpeed:getRating('ft-speed'), ftPos:getRating('ft-pos'), ftRec:getRating('ft-rec'),
    mnFocus:getRating('mn-focus'), mnMotiv:getRating('mn-motiv'), mnNerve:getRating('mn-nerve'), mnTeam:getRating('mn-team'),
  };
  const totalScore = Math.round(Object.values(ratings).reduce((a,v)=>a+v,0)/Object.values(ratings).length*20);
  const report = {
    id: 'r'+Date.now(),
    coachId: currentUser.coachId,
    coachName: currentUser.name,
    playerId, playerName: player.name, playerLevel: player.level,
    date: document.getElementById('r-date').value,
    sessionTime: document.getElementById('r-time').value,
    attendance: document.getElementById('r-attend').value,
    focusAreas, ratings, totalScore,
    mood: document.getElementById('r-mood').value,
    upgrade: document.getElementById('r-upgrade').value,
    progress: document.getElementById('r-progress').value,
    challenge: document.getElementById('r-challenge').value,
    homework: document.getElementById('r-homework').value,
    coachNote: document.getElementById('r-parent').value,
    createdAt: new Date().toISOString(),
  };
  const reports = getReports();
  reports.push(report);
  saveReports(reports);
  const alert = document.getElementById('saveAlert');
  alert.classList.add('show');
  setTimeout(()=>{alert.classList.remove('show');resetForm();},3000);
}

function resetForm(){
  document.getElementById('r-player').value='';
  document.getElementById('r-level').value='';
  document.getElementById('r-progress').value='';
  document.getElementById('r-challenge').value='';
  document.getElementById('r-homework').value='';
  document.getElementById('r-parent').value='';
  document.querySelectorAll('#focusGroup .check-item.checked').forEach(el=>{el.classList.remove('checked');el.querySelector('input').checked=false;});
}

function showPlayerProfile(playerId, backTab, period){
  period = period || 'all';
  const player = getPlayers().find(p=>p.id===playerId);
  if(!player) return;
  const allReports = getReports().filter(r=>r.playerId===playerId).slice().sort((a,b)=>dateToMiladi(a.date)-dateToMiladi(b.date));

  const now = new Date();
  let reports = allReports;
  if(period === 'weekly'){
    const cutoff = new Date(now); cutoff.setDate(cutoff.getDate()-7);
    reports = allReports.filter(r=>dateToMiladi(r.date) >= cutoff);
  } else if(period === 'monthly'){
    const cutoff = new Date(now); cutoff.setMonth(cutoff.getMonth()-1);
    reports = allReports.filter(r=>dateToMiladi(r.date) >= cutoff);
  }

  const segLabels = Object.keys(SKILL_SEGMENTS);
  const periodLabel = {weekly:'هفتگی (۷ روز اخیر)', monthly:'ماهانه (۳۰ روز اخیر)', all:'روند کلی از ابتدا'}[period];

  const html = `
  <div class="section-header">
    <div class="section-title">📈 روند پیشرفت — ${player.name}</div>
    <button style="background:var(--lightgray);color:var(--gray);border:none;border-radius:8px;padding:.6rem 1.2rem;font-family:'Vazirmatn',sans-serif;font-size:.8rem;cursor:pointer;" onclick="showTab('${backTab}')">← بازگشت</button>
  </div>

  <div class="card no-print">
    <div class="card-title"><span class="ico">📤</span> خروجی گزارش برای والدین</div>
    <div class="form-grid-3">
      <div class="form-group" style="margin-bottom:0;">
        <label>بازه زمانی</label>
        <select id="profPeriod" onchange="showPlayerProfile('${playerId}','${backTab}', this.value)">
          <option value="weekly" ${period==='weekly'?'selected':''}>هفتگی (۷ روز اخیر)</option>
          <option value="monthly" ${period==='monthly'?'selected':''}>ماهانه (۳۰ روز اخیر)</option>
          <option value="all" ${period==='all'?'selected':''}>روند کلی از ابتدا</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:0;display:flex;align-items:flex-end;">
        <button class="submit-btn" style="width:100%;font-size:.85rem;" onclick="exportPlayerExcel('${playerId}','${period}')">📊 خروجی Excel</button>
      </div>
      <div class="form-group" style="margin-bottom:0;display:flex;align-items:flex-end;">
        <button class="submit-btn" style="width:100%;font-size:.85rem;background:var(--green2);" onclick="exportPlayerPDF('${playerId}','${period}')">📄 خروجی PDF</button>
      </div>
    </div>
  </div>

  ${reports.length===0 ? `<div class="empty-state"><span class="ico">📭</span><p>گزارشی برای بازه «${periodLabel}» یافت نشد</p></div>` : `
  <div class="card">
    <div class="card-title"><span class="ico">📊</span> روند نمره کلی — ${periodLabel}</div>
    <canvas id="overallTrendChart" height="100"></canvas>
  </div>
  <div class="card">
    <div class="card-title"><span class="ico">🧩</span> روند سگمنت‌ها — ${periodLabel}</div>
    <canvas id="segTrendChart" height="120"></canvas>
  </div>
  `}
  `;
  document.getElementById('mainContent').innerHTML = html;
  if(reports.length) setTimeout(()=>renderProfileCharts(reports, segLabels), 50);
}

function renderProfileCharts(reports, segLabels){
  const labels = reports.map(r=>r.date);
  if(window._overallTrendChart) window._overallTrendChart.destroy();
  if(window._segTrendChart) window._segTrendChart.destroy();

  const ovCtx = document.getElementById('overallTrendChart');
  if(ovCtx && typeof Chart!=='undefined'){
    window._overallTrendChart = new Chart(ovCtx, {
      type:'line',
      data:{
        labels,
        datasets:[{
          label:'نمره کلی',
          data: reports.map(r=>r.totalScore),
          borderColor:'#c4622d',
          backgroundColor:'rgba(196,98,45,.15)',
          tension:.3, fill:true, pointRadius:4,
        }]
      },
      options:{
        scales:{ y:{ min:0, max:100 } },
        plugins:{ legend:{display:false} }
      }
    });
  }

  const segCtx = document.getElementById('segTrendChart');
  if(segCtx && typeof Chart!=='undefined'){
    const datasets = segLabels.map((seg,i)=>({
      label: seg,
      data: reports.map(r=>segmentAverage(r.ratings, SKILL_SEGMENTS[seg])),
      borderColor: CHART_COLORS[i % CHART_COLORS.length],
      backgroundColor:'transparent',
      tension:.3, pointRadius:3,
    }));
    window._segTrendChart = new Chart(segCtx, {
      type:'line',
      data:{ labels, datasets },
      options:{
        scales:{ y:{ min:0, max:5, ticks:{stepSize:1} } },
        plugins:{ legend:{position:'bottom', labels:{font:{family:'Vazirmatn', size:11}}} }
      }
    });
  }
}

function getFilteredReports(playerId, period){
  const all = getReports().filter(r=>r.playerId===playerId).slice().sort((a,b)=>dateToMiladi(a.date)-dateToMiladi(b.date));
  const now = new Date();
  if(period === 'weekly'){
    const cutoff = new Date(now); cutoff.setDate(cutoff.getDate()-7);
    return all.filter(r=>dateToMiladi(r.date) >= cutoff);
  }
  if(period === 'monthly'){
    const cutoff = new Date(now); cutoff.setMonth(cutoff.getMonth()-1);
    return all.filter(r=>dateToMiladi(r.date) >= cutoff);
  }
  return all;
}

function exportPlayerExcel(playerId, period){
  const player = getPlayers().find(p=>p.id===playerId);
  const reports = getFilteredReports(playerId, period);
  if(!reports.length){ alert('گزارشی برای این بازه یافت نشد'); return; }
  const periodLabel = {weekly:'هفتگی', monthly:'ماهانه', all:'کلی'}[period];

  const summary = reports.map(r=>({
    'تاریخ': miladi2Shamsi(r.date), 'ساعت': r.sessionTime, 'مربی': r.coachName,
    'حضور': r.attendance, 'نمره کلی': r.totalScore, 'حال بازیکن': r.mood,
    'ارتقاء سطح': r.upgrade, 'پیشرفت': r.progress||'', 'چالش': r.challenge||'',
    'تمرین خانگی': r.homework||'', 'پیام به والدین': r.coachNote||'',
  }));

  const skillRows = reports.map(r=>{
    const row = {'تاریخ': miladi2Shamsi(r.date)};
    Object.entries(SKILL_NAMES_MAP).forEach(([k,label])=>{ row[label] = r.ratings?.[k] ?? ''; });
    return row;
  });

  const segRows = reports.map(r=>{
    const row = {'تاریخ': miladi2Shamsi(r.date), 'نمره کلی': r.totalScore};
    Object.keys(SKILL_SEGMENTS).forEach(seg=>{ row[seg] = segmentAverage(r.ratings, SKILL_SEGMENTS[seg]); });
    return row;
  });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summary), 'خلاصه');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(segRows), 'سگمنت‌ها');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(skillRows), 'جزئیات مهارت‌ها');
  XLSX.writeFile(wb, `گزارش-${player.name}-${periodLabel}.xlsx`);
}

async function generateCoachSuggestion(playerId){
  const box = document.getElementById('aiSuggestionBox');
  const player = getPlayers().find(p=>p.id===playerId);
  const reports = getReports().filter(r=>r.playerId===playerId).slice().sort((a,b)=>dateToMiladi(a.date)-dateToMiladi(b.date));

  const header = `<div class="sec-divider" style="margin-top:.5rem;">🎯 پیشنهاد دستیار مربی برای این جلسه</div>`;

  if(!reports.length){
    box.innerHTML = `${header}<div style="background:#f8f5f2;border-radius:8px;padding:.9rem;font-size:.82rem;color:var(--gray);">برای این بازیکن هنوز گزارشی ثبت نشده، پس پیشنهاد ویژه‌ای موجود نیست. بعد از ثبت اولین گزارش، از جلسه بعد پیشنهادها نمایش داده می‌شود.</div>`;
    return;
  }

  box.innerHTML = `${header}<div style="text-align:center;padding:1rem;color:var(--gray);font-size:.85rem;">🎾 در حال تحلیل سابقه ${player.name}...</div>`;

  const recent = reports.slice(-6);
  const segLabels = Object.keys(SKILL_SEGMENTS);
  const historyText = recent.map(r=>{
    const segs = segLabels.map(seg=>`${seg}: ${segmentAverage(r.ratings, SKILL_SEGMENTS[seg])}/5`).join('، ');
    return `تاریخ ${miladi2Shamsi(r.date)} | نمره کلی ${r.totalScore}/100 | حضور: ${r.attendance} | حال: ${r.mood} | سگمنت‌ها → ${segs} | تمرکز جلسه: ${(r.focusAreas||[]).join('، ')||'-'} | پیشرفت: ${r.progress||'-'} | چالش: ${r.challenge||'-'}`;
  }).join('\n');

  const prompt = `تو یک مربی فوق‌حرفه‌ای و باتجربه تنیس هستی که به عنوان دستیار مربیان آکادمی SLR کار می‌کنی.
اطلاعات بازیکن:
نام: ${player.name}، سن: ${player.age}، سطح: ${player.level}

سابقه ${recent.length} جلسه اخیر (قدیمی به جدید):
${historyText}

بر اساس این سابقه، یک پیشنهاد برای جلسه بعدی (همین جلسه‌ای که مربی الان می‌خواهد برگزار کند) بده شامل:
1. مهم‌ترین ۲ تا ۳ موضوع تمرینی که باید روی آن‌ها تمرکز شود و چرا (با توجه به نقاط ضعف و روند نزولی/صعودی)
2. برای هر موضوع، یک تمرین مشخص و قابل اجرا (با توضیح کوتاه نحوه اجرا، تعداد تکرار/زمان تقریبی)
3. یک نکته درباره حالت روحی/انگیزشی بازیکن بر اساس روند اخیر

پاسخ را کوتاه، عملی و به فارسی، با فرمت بولت‌وار و بدون مقدمه اضافه بنویس.`;

  try{
    const response = await fetch("/api/coach-suggestion", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt })
    });
    const data = await response.json();
    if (data.error) throw new Error(data.error);
    const text = data.text || '';
    if(!text) throw new Error('empty');
    box.innerHTML = `${header}
      <div style="background:#fdf0ea;border:1px solid #f0c0a0;border-radius:8px;padding:1.2rem;font-size:.85rem;line-height:1.9;white-space:pre-wrap;">${text.replace(/</g,'&lt;')}</div>
      <div style="text-align:left;margin-top:.6rem;">
        <button class="submit-btn" style="font-size:.75rem;padding:.4rem 1rem;background:var(--lightgray);color:var(--gray);" onclick="generateCoachSuggestion('${playerId}')">🔄 پیشنهاد جدید</button>
      </div>`;
  }catch(e){
    box.innerHTML = `${header}
      <div class="alert alert-err show" style="margin-bottom:.6rem;">⚠️ خطا در دریافت پیشنهاد. لطفاً دوباره تلاش کنید.</div>
      <button class="submit-btn" style="font-size:.8rem;padding:.5rem 1.2rem;" onclick="generateCoachSuggestion('${playerId}')">✨ تلاش دوباره</button>`;
  }
}

function renderReportCharts(segLabels, segValues, totalScore){
  if(window._segChart) window._segChart.destroy();
  if(window._overallChart) window._overallChart.destroy();
  const segCtx = document.getElementById('segChart');
  const ovCtx = document.getElementById('overallChart');
  if(!segCtx || !ovCtx || typeof Chart==='undefined') return;
  window._segChart = new Chart(segCtx, {
    type:'radar',
    data:{
      labels: segLabels,
      datasets:[{
        label:'میانگین (از ۵)',
        data: segValues,
        backgroundColor:'rgba(196,98,45,.2)',
        borderColor:'#c4622d',
        pointBackgroundColor:'#c4622d',
        borderWidth:2,
      }]
    },
    options:{
      scales:{ r:{ min:0, max:5, ticks:{stepSize:1}, pointLabels:{font:{family:'Vazirmatn', size:11}} } },
      plugins:{ legend:{display:false} }
    }
  });
  const scoreColor = totalScore>=80?'#2d7a3a':totalScore>=60?'#c4622d':'#c0392b';
  window._overallChart = new Chart(ovCtx, {
    type:'doughnut',
    data:{
      labels:['نمره','باقی‌مانده'],
      datasets:[{ data:[totalScore, 100-totalScore], backgroundColor:[scoreColor,'#f0ece3'], borderWidth:0 }]
    },
    options:{
      cutout:'72%',
      plugins:{
        legend:{display:false},
        tooltip:{enabled:false}
      }
    },
    plugins:[{
      id:'centerText',
      afterDraw(chart){
        const {ctx, chartArea:{width,height,left,top}} = chart;
        ctx.save();
        ctx.font = '800 1.8rem Vazirmatn, sans-serif';
        ctx.fillStyle = scoreColor;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(totalScore, left+width/2, top+height/2-8);
        ctx.font='600 .7rem Vazirmatn, sans-serif';
        ctx.fillStyle='#8a7a6e';
        ctx.fillText('از ۱۰۰', left+width/2, top+height/2+16);
        ctx.restore();
      }
    }]
  });
}

function editCoach(id){ showAddCoach(id); }

function saveCoach(editId){
  const name  = document.getElementById('nc-name').value.trim();
  const spec  = document.getElementById('nc-spec').value.trim();
  const email = document.getElementById('nc-email').value.trim();
  const pass  = document.getElementById('nc-pass').value.trim();
  if(!name||!email||!pass){alert('نام، ایمیل و رمز عبور الزامی است');return;}
  const coaches = getCoachesDyn();
  if(editId){
    const idx = coaches.findIndex(c=>c.id===editId);
    if(idx>-1){ coaches[idx] = {...coaches[idx], name, specialty:spec, email, pass}; }
  } else {
    const newId = 'c'+Date.now();
    coaches.push({id:newId, name, specialty:spec||'مربی', email, pass});
  }
  saveCoachesDyn(coaches);
  syncCoachUsers();
  document.getElementById('reportModal').classList.remove('on');
  renderManageCoaches();
}

function deleteCoach(id){
  if(!confirm('آیا مطمئن هستید؟ این مربی از سیستم حذف می‌شود.')) return;
  const coaches = getCoachesDyn().filter(c=>c.id!==id);
  saveCoachesDyn(coaches);
  syncCoachUsers();
  renderManageCoaches();
}

  const d = document.getElementById('todayDateDisplay');
  if (d) d.textContent = todayShamsiReadable();
});

// live preview تاریخ شمسی
document.addEventListener('input', function(e) {
  if (e.target && e.target.id === 'r-date') {
    const val = e.target.value;
    const prev = document.getElementById('datePreview');
    if (prev && val.match(/^\d{4}-\d{1,2}-\d{1,2}$/)) {
      prev.textContent = '📅 ' + miladi2Shamsi(val);
      prev.style.color = 'var(--clay)';
    } else if (prev) {
      prev.textContent = '';
    }
  }
});
